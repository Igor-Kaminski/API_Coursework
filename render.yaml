databases:
  - name: rail-api-db
    databaseName: rail_api
    user: rail_api
    plan: free

services:
  - type: web
    name: rail-api-coursework
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: rail-api-db
          property: connectionString
      - key: DATABASE_ECHO
        value: "false"
      - key: DEBUG
        value: "false"
      - key: ADMIN_API_KEY
        generateValue: true
      - key: OPERATOR_API_KEY
        generateValue: true
      - key: USER_API_KEY
        generateValue: true
